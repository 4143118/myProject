<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Breath Visualization</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
    <script src="main.js" defer></script>
</head>
<body>

<!--Intro dialog-->
<dialog id="intro-dialog">
    <nav>
        <button id = "instruction" class="instruction active-tab" >Instruction</button>
        <button id = "settings" class="settings" >Settings</button>
    </nav>

  <div class="dialog-content">
    <div id="instruction-panel">
        <h1> Let's Take Deep Breath Together!</h1>
        <p> Hold: inhale (generate rings)</p>
        <p> Release: start exhale</p>
        <p> SPACE: end exhale, pause current flow</p>
        <p> Q: freeze everything</p>
        <p> R: clean the canvas</p>
        <p> Tab: reopen this dialogue</p>
    </div>

       <div id="settings-panel" class="hidden">
           <div class="setting-row">
            <span>Background Music</span>
               <button id="music-toggle" class="toggle-switch active">ON</button>
           </div>

           <div class="setting-row">
            <span>Irregular Shape Mode</span>
            <button id="shape-toggle" class="toggle-switch">OFF</button>
           </div>

           <div class="setting-row color-setting">
               <span>Color Theme</span>
               <div class="palette-list">
                   <button class="palette-card selected" data-bg="rgb(31, 34, 50)" data-line="rgb(255,255,255)">
                       <span style="background:rgb(31, 34, 50)"></span>
                       <span style="background:rgb(255, 255, 255)"></span>
                   </button>

                   <button class="palette-card" data-bg="rgb(17,30,76)" data-line="rgb(255,210,245)">
                       <span style="background:rgb(17,30,76)"></span>
                       <span style="background:rgb(255,210,245)"></span>
                   </button>

                   <button class="palette-card" data-bg="rgb(190, 255, 230)" data-line="rgb(71,54,0,0.71)">
                       <span style="background:rgb(190, 255, 230)"></span>
                       <span style="background:rgba(71,54,0,0.71)"></span>
                   </button>

                   <button class="palette-card" data-bg="rgb(255,240,180)" data-line="rgb(53,34,19)">
                       <span style="background:rgb(255,240,180)"></span>
                       <span style="background:rgb(53,34,19)"></span>
                   </button>
               </div>
           </div>
       </div>

      <button type="button" class="dialog-close-button" autofocus>Nyeah~</button>
  </div>
</dialog>

<!--create a canvas to contain users' drawing-->
<canvas id="canvas"></canvas>

<button id="help-button" type="button">Help</button>

<audio id="bg-music" src="source/meditation-2.mp3" loop></audio>


</body>
</html>
