<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Breath Visualization</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
    <script src="main.js" defer></script>
</head>
<body>

<!--Intro dialog-->
<dialog id="intro-dialog">
    <h1> Let's Take Deep Breath Together!</h1>
    <p> Hold: inhale (generate rings)</p>
    <p> Release: start exhale</p>
    <p> SPACE: end exhale, pause current flow</p>
    <p> Q: freeze everything</p>
    <p> R: clean the canvas</p>
    <p> Tab: reopen this dialogue</p>
    <button id="dialog-close-button" autofocus>Nyeah~</button>
</dialog>

<!--create a canvas to contain users' drawing-->
<canvas id="canvas"></canvas>

</body>
</html>
